version: 2

models:
  - name: crm_customers
    description: >
      Cleaned and standardized customer records. Zip codes are left-padded to
      5 characters, city names are lowercased and trimmed, state codes are
      uppercased. Rows with null customer_id are excluded.
    columns:
      - name: customer_id
        description: Primary key. Unique identifier for the customer in this order context.
      - name: customer_unique_id
        description: Persistent customer identifier across multiple orders.
      - name: customer_zip_code_prefix
        description: 5-character zip code prefix, left-padded with zeros.
      - name: customer_city
        description: Customer city, lowercased and trimmed.
      - name: customer_state
        description: Customer state code, uppercased (2 characters).

  - name: crm_order_reviews
    description: >
      Cleaned customer review records. Review score validated to range 1-5,
      out-of-range values set to null. Empty comment fields converted to null.
      Rows missing review_id or order_id are excluded.
    columns:
      - name: review_id
        description: Primary key. Unique identifier for the review.
      - name: order_id
        description: Foreign key to erp_orders.
      - name: review_score
        description: Customer satisfaction score from 1 to 5. Null if original value was out of range.
      - name: review_comment_title
        description: Optional review title. Null if empty in source.
      - name: review_comment_message
        description: Optional review body text. Null if empty in source.
      - name: review_creation_date
        description: Timestamp when the review was created.
      - name: review_answer_timestamp
        description: Timestamp when the review was answered.

  - name: erp_orders
    description: >
      Cleaned order headers with all timestamps cast to TIMESTAMP type.
      Order status lowercased. Rows missing order_id or customer_id excluded.
    columns:
      - name: order_id
        description: Primary key. Unique order identifier.
      - name: customer_id
        description: Foreign key to crm_customers.
      - name: order_status
        description: Current order status, lowercased.
      - name: order_purchase_timestamp
        description: Timestamp when the order was placed.
      - name: order_approved_at
        description: Timestamp when payment was approved. Null if not yet approved.
      - name: order_delivered_carrier_date
        description: Timestamp when the order was handed to the carrier. Null if not yet shipped.
      - name: order_delivered_customer_date
        description: Timestamp when the order was delivered. Null if not yet delivered.
      - name: order_estimated_delivery_date
        description: Estimated delivery timestamp provided at purchase time.

  - name: erp_order_items
    description: >
      Cleaned order line items with numeric columns cast to correct types.
      Rows missing order_id or product_id excluded.
    columns:
      - name: order_id
        description: Foreign key to erp_orders.
      - name: order_item_id
        description: Sequential item number within an order. Composite key with order_id.
      - name: product_id
        description: Foreign key to erp_products.
      - name: seller_id
        description: Foreign key to erp_sellers.
      - name: shipping_limit_date
        description: Deadline timestamp for the seller to ship the order.
      - name: price
        description: Item price in BRL.
      - name: freight_value
        description: Freight cost for the item in BRL.

  - name: erp_order_payments
    description: >
      Cleaned payment records per order. An order may have multiple rows
      across different payment types or installments. Payment type lowercased.
    columns:
      - name: order_id
        description: Foreign key to erp_orders.
      - name: payment_sequential
        description: Payment sequence number within an order.
      - name: payment_type
        description: Payment method (credit_card, boleto, voucher, debit_card), lowercased.
      - name: payment_installments
        description: Number of installments chosen by the customer.
      - name: payment_value
        description: Payment amount in BRL.

  - name: erp_products
    description: >
      Cleaned product catalog. Numeric columns cast to correct types.
      Column name typos corrected from source: lenght -> length.
      Rows missing product_id excluded.
    columns:
      - name: product_id
        description: Primary key. Unique product identifier.
      - name: product_category_name
        description: Product category in Portuguese, lowercased.
      - name: product_name_length
        description: Character count of the product name. Renamed from product_name_lenght.
      - name: product_description_length
        description: Character count of the product description. Renamed from product_description_lenght.
      - name: product_photos_qty
        description: Number of product photos.
      - name: product_weight_g
        description: Product weight in grams.
      - name: product_length_cm
        description: Product length in centimeters.
      - name: product_height_cm
        description: Product height in centimeters.
      - name: product_width_cm
        description: Product width in centimeters.

  - name: erp_sellers
    description: >
      Cleaned seller records. Zip codes left-padded to 5 characters,
      city names lowercased and trimmed, state codes uppercased.
    columns:
      - name: seller_id
        description: Primary key. Unique seller identifier.
      - name: seller_zip_code_prefix
        description: 5-character zip code prefix, left-padded with zeros.
      - name: seller_city
        description: Seller city, lowercased and trimmed.
      - name: seller_state
        description: Seller state code, uppercased (2 characters).

  - name: erp_product_category_name_translation
    description: >
      Cleaned mapping table from Portuguese category names to English.
      Both columns lowercased and trimmed.
    columns:
      - name: product_category_name
        description: Product category name in Portuguese, lowercased.
      - name: product_category_name_english
        description: Product category name in English, lowercased.

  - name: erp_geolocation
    description: >
      Cleaned and deduplicated geolocation data. Coordinates outside Brazil
      bounds filtered out. Deduplicated to one row per zip code prefix using
      average coordinates. Reduced from ~1M Bronze rows to ~19k Silver rows.
    columns:
      - name: geolocation_zip_code_prefix
        description: Primary key. 5-character zip code prefix, left-padded with zeros.
      - name: geolocation_lat
        description: Average latitude for the zip code prefix, rounded to 6 decimal places.
      - name: geolocation_lng
        description: Average longitude for the zip code prefix, rounded to 6 decimal places.
      - name: geolocation_city
        description: City name for the zip code prefix, lowercased.
      - name: geolocation_state
        description: State code for the zip code prefix, uppercased.

