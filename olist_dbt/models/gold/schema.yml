version: 2

models:
  - name: dim_customers
    description: >
      Customer dimension enriched with geolocation coordinates. Joins
      crm_customers with erp_geolocation on zip code prefix. One row per
      customer_id.
    columns:
      - name: customer_id
        description: Primary key. Unique customer identifier per order context.
        tests:
          - not_null
          - unique
      - name: customer_unique_id
        description: Persistent customer identifier across multiple orders.
        tests:
          - not_null
      - name: customer_zip_code_prefix
        description: 5-character zip code prefix.
        tests:
          - not_null
      - name: customer_city
        description: Customer city, lowercased.
        tests:
          - not_null
      - name: customer_state
        description: Customer state code, uppercased.
        tests:
          - not_null

  - name: dim_sellers
    description: >
      Seller dimension enriched with geolocation coordinates. Joins
      erp_sellers with erp_geolocation on zip code prefix. One row per
      seller_id.
    columns:
      - name: seller_id
        description: Primary key. Unique seller identifier.
        tests:
          - not_null
          - unique

  - name: dim_products
    description: >
      Product dimension enriched with English category names. Joins
      erp_products with erp_product_category_name_translation. Falls back
      to Portuguese category name if no translation exists. One row per
      product_id.
      Known issue: 610 products have a null product_category_name in the source,
      resulting in a null product_category_name_english with no fallback available.
    columns:
      - name: product_id
        description: Primary key. Unique product identifier.
        tests:
          - not_null
          - unique
      - name: product_category_name_english
        description: >
          Product category in English. Falls back to Portuguese if no translation
          found. Null if product_category_name is null in the source.

  - name: dim_date
    description: >
      Date dimension derived from distinct order purchase dates in erp_orders.
      Contains one row per date that appears in the orders dataset.
    columns:
      - name: date_day
        description: Primary key. Calendar date.
        tests:
          - not_null
          - unique

  - name: fact_orders
    description: >
      Core fact model at order-item grain. One row per order item. Joins
      erp_order_items with erp_orders and aggregated erp_order_payments.
      Contains foreign keys to all four dimension tables and pre-calculated
      delivery and payment metrics.
    columns:
      - name: order_id
        description: Foreign key to dim_date (via order_date) and order header identifier.
        tests:
          - not_null
      - name: order_item_id
        description: Sequential item number within the order. Composite key with order_id.
        tests:
          - not_null
      - name: product_id
        description: Foreign key to dim_products.
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_id
      - name: seller_id
        description: Foreign key to dim_sellers.
        tests:
          - not_null
          - relationships:
              to: ref('dim_sellers')
              field: seller_id
      - name: customer_id
        description: Foreign key to dim_customers.
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: order_date
        description: Foreign key to dim_date.
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_day
      - name: order_status
        description: Current order status.
        tests:
          - not_null
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'invoiced', 'processing', 'unavailable', 'approved', 'created']
      - name: price
        description: Item price in BRL.
        tests:
          - not_null
      - name: freight_value
        description: Freight cost for the item in BRL.
        tests:
          - not_null
      - name: is_delivered
        description: True if order_status is delivered.
        tests:
          - not_null
