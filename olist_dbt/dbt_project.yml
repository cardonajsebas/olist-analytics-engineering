# olist_dbt - Analytics Engineering Project
# Materialization strategy:
#   bronze: table  - referenced as dbt sources, not built by dbt
#   silver: table  - cleaning and standardization, full refresh
#   gold:   view   - Star Schema, derived from Silver at query time

name: olist_dbt
version: 1.0.0
config-version: 2

profile: olist_dbt

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  olist_dbt:
    bronze:
      +materialized: table
      +schema: bronze
    silver:
      +materialized: table
      +schema: silver
    gold:
      +materialized: view
      +schema: gold
